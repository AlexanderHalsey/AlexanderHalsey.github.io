<div
  #cardRef
  class="h-full cursor-pointer"
  role="button"
  tabindex="0"
  (click)="handleClick()"
  (keydown.enter)="handleClick()"
  (keydown.space)="handleClick()"
>
  <app-card [interactive]="true" [image]="project().images?.[0]">
    <h3 class="font-bold text-lg">{{ project().title }}</h3>
    <p class="mt-3 text-sm text-gray-600 dark:text-gray-300">{{ project().summary }}</p>
    <div class="flex flex-wrap gap-2 mt-4">
      @for (tag of project().tech; track tag) {
        <span
          class="text-xs px-2 py-1 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300"
        >
          {{ tag }}
        </span>
      }
    </div>
  </app-card>
</div>
